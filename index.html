<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A simple client-side calculator (FR-001)" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app">
    <section class="calculator" role="application" aria-label="Calculator">
      <output id="display" class="display" aria-live="polite">0</output>
      <div class="keys">
        <button class="key key--action" data-action="clear" aria-label="Clear">AC</button>
        <button class="key key--action" data-action="sign" aria-label="Toggle sign">+/-</button>
        <button class="key key--action" data-action="percent" aria-label="Percent">%</button>
        <button class="key key--operator" data-operator="/" aria-label="Divide">&divide;</button>

        <button class="key key--digit" data-digit="7">7</button>
        <button class="key key--digit" data-digit="8">8</button>
        <button class="key key--digit" data-digit="9">9</button>
        <button class="key key--operator" data-operator="*" aria-label="Multiply">&times;</button>

        <button class="key key--digit" data-digit="4">4</button>
        <button class="key key--digit" data-digit="5">5</button>
        <button class="key key--digit" data-digit="6">6</button>
        <button class="key key--operator" data-operator="-" aria-label="Subtract">&minus;</button>

        <button class="key key--digit" data-digit="1">1</button>
        <button class="key key--digit" data-digit="2">2</button>
        <button class="key key--digit" data-digit="3">3</button>
        <button class="key key--operator" data-operator="+" aria-label="Add">+</button>

        <button class="key key--digit key--zero" data-digit="0">0</button>
        <button class="key key--digit" data-action="decimal">.</button>
        <button class="key key--equals" data-action="equals" aria-label="Equals">=</button>
      </div>
    </section>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
